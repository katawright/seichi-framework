name: Validate Front Matter

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".schema/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".prettierrc"
      - ".prettierignore"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the stamp freshness check sees real per-file commit dates

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run validate

      - run: npm test
