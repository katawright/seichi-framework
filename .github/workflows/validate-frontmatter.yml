name: Validate Front Matter

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".schema/**"
      - "package.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: node .schema/validate.mjs
