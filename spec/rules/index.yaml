# Kernel rule registry — the first-slice rule IDs with metadata and source
# pointers. Rule bodies migrate to marker-anchored spans in their one
# normative home (Phase 3, Waves A–D); until a rule's wave lands, its body
# lives unanchored in the cited source.
#
# ID convention: `<PREFIX>-<NNN>` — an uppercase domain-concept prefix
# (adopted verbatim from the framework's existing families, including the
# 3-char OMG/SEC) plus a zero-padded 3-digit number unique within the prefix.
# Sub-IDs keep a lowercase suffix with the padded number (AW-004a). An ID,
# once assigned, is permanent and never reused; a material semantic change
# mints a successor (`supersedes`/`superseded_by`), a reword keeps the ID.
# Deterministic ordering is (PREFIX ascending, NNN ascending, suffix
# ascending). Numbering gaps are accepted (skipped non-kernel material).
#
# Fields: layer 1a (structured) | 1b (compact prose contract); basis
# both-conjuncts | divergent-consumption | resolver-input | 1b; source = the
# one normative home; introduced = framework version the rule entered
# (`verify` until the provenance pass fills it — a mechanical follow-up, not
# a manifest blocker); status active | superseded | deprecated.
#
# Migration fields (Phase 3, set in the same commit that migrates a rule):
#   representation: data | data+contract | contract — how the rule migrated
#     (Decision P3-3). Present on every migrated row. For `data+contract`
#     and `contract`, the body is marker-anchored in its `source`:
#     `<!-- rule: <ID> -->` … `<!-- /rule: <ID> -->` around the body, exactly
#     one flat pair (no nesting), opening with the visible `### <ID> — <title>`
#     heading (Decision P3-2 + the Q2 rider); the validate suite enforces the
#     coupling in both directions. For `data` (ST-001, AW-001 — the approved
#     links-only carve-out) there is NO marker span: the rule's substance
#     lives in the structured data homes named in the row's notes, consumed
#     by the generator; the validate suite forbids a marker on data rows.
#     (Data-source existence/binding checks are a registered follow-up.)
#   links: rationale locations (the guide text that keeps the why) —
#     repo-relative paths, optionally with a #heading-anchor fragment.

